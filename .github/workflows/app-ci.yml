name: App CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  full-gate-and-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-build.lock
          python -m pip install --disable-pip-version-check --require-hashes -r requirements.lock
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e .
          python -m pip install --disable-pip-version-check pytest==9.0.2 ruff==0.15.0
          npm --prefix frontend ci
          sudo apt-get update
          sudo apt-get install --yes bats postgresql-16
      - name: Verify the PostgreSQL 16 migration contract
        env:
          REQUIRE_PG16: "1"
        run: |
          set -euo pipefail
          export PATH="/usr/lib/postgresql/16/bin:$PATH"
          tap_file="$(mktemp)"
          trap 'rm -f "$tap_file"' EXIT
          bats --formatter tap tests/db-migrate.bats | tee "$tap_file"
          awk '
            /^1[.][.]70$/ { plans++ }
            /^ok [0-9]+ / { passed++ }
            /^not ok / || /# skip/ { bad=1 }
            END { exit !(plans == 1 && passed == 70 && !bad) }
          ' "$tap_file"
      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high
      - name: Run the full repository gate
        run: ./ralph/scripts/run_checks.sh --full
      - name: Build the same-origin application image
        run: docker build --tag shindang:${GITHUB_SHA} .

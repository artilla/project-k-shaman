name: Deploy staging

on:
  workflow_dispatch:
    inputs:
      site_address:
        description: Confirmed HTTPS staging origin, without a trailing slash
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: shindang-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_digest: ${{ steps.deploy.outputs.image_digest }}
      previous_digest: ${{ steps.deploy.outputs.previous_digest }}
      previous_release: ${{ steps.deploy.outputs.previous_release }}
    env:
      AWS_REGION: ap-northeast-2
      DEPLOY_ENV: ${{ vars.SHINDANG_ENV }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate deployment inputs
        env:
          APP_SECRET_ID: ${{ vars.APP_SECRET_ID }}
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          DEPLOYMENT_BUCKET: ${{ vars.DEPLOYMENT_BUCKET }}
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          SITE_ADDRESS: ${{ inputs.site_address }}
          STAGING_INSTANCE_ID: ${{ vars.STAGING_INSTANCE_ID }}
          STAGING_LOG_GROUP: ${{ vars.STAGING_LOG_GROUP }}
        run: |
          test "$DEPLOY_ENV" = staging
          [[ "$SITE_ADDRESS" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          registry="${ECR_REPOSITORY_URI%%/*}"
          repository="${ECR_REPOSITORY_URI#"$registry/"}"
          registry_pattern="^[0-9]{12}[.]dkr[.]ecr[.]${AWS_REGION}[.]amazonaws[.]com$"
          [[ "$ECR_REPOSITORY_URI" == "$registry/"* ]]
          [[ "$registry" =~ $registry_pattern ]]
          [[ "$repository" =~ ^[a-z0-9]+([._/-][a-z0-9]+)*$ ]]
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$DEPLOYMENT_BUCKET"
          test -n "$STAGING_INSTANCE_ID"
          test -n "$APP_SECRET_ID"
          test -n "$STAGING_LOG_GROUP"
      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-build.lock
          python -m pip install --disable-pip-version-check --require-hashes -r requirements.lock
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e .
          python -m pip install --disable-pip-version-check pytest==9.0.2 ruff==0.15.0
          npm --prefix frontend ci
          sudo apt-get update
          sudo apt-get install --yes bats postgresql-16
      - name: Verify the PostgreSQL 16 migration contract
        env:
          REQUIRE_PG16: "1"
        run: |
          set -euo pipefail
          export PATH="/usr/lib/postgresql/16/bin:$PATH"
          tap_file="$(mktemp)"
          trap 'rm -f "$tap_file"' EXIT
          bats --formatter tap tests/db-migrate.bats | tee "$tap_file"
          awk '
            /^1[.][.]70$/ { plans++ }
            /^ok [0-9]+ / { passed++ }
            /^not ok / || /# skip/ { bad=1 }
            END { exit !(plans == 1 && passed == 70 && !bad) }
          ' "$tap_file"
      - name: Run the full repository gate
        run: ./ralph/scripts/run_checks.sh --full
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
      - name: Build and push immutable ARM64 image
        id: image
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --tag "$ECR_REPOSITORY_URI:$GITHUB_SHA" \
            --metadata-file image-metadata.json \
            .
          digest="$(jq -r '."containerimage.digest"' image-metadata.json)"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "image=$ECR_REPOSITORY_URI@$digest" >> "$GITHUB_OUTPUT"
      - name: Upload immutable deployment bundle version
        id: bundle
        env:
          DEPLOYMENT_BUCKET: ${{ vars.DEPLOYMENT_BUCKET }}
        run: |
          bundle_key="deployments/$GITHUB_SHA/$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.tgz"
          tar -czf deployment.tgz -C deploy \
            compose.aws.yaml Caddyfile remote_deploy.sh remote_rollback.sh
          bundle_sha256="$(sha256sum deployment.tgz | awk '{print $1}')"
          put_result="$(aws s3api put-object \
            --bucket "$DEPLOYMENT_BUCKET" \
            --key "$bundle_key" \
            --body deployment.tgz \
            --checksum-algorithm SHA256)"
          version_id="$(jq -er '.VersionId | select(type == "string" and length > 0)' <<<"$put_result")"
          [[ "$bundle_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$version_id" =~ ^[-A-Za-z0-9._~+/=]+$ ]]
          test "${#version_id}" -le 1024
          test "$version_id" != null
          echo "key=$bundle_key" >> "$GITHUB_OUTPUT"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"
          echo "sha256=$bundle_sha256" >> "$GITHUB_OUTPUT"
      - name: Deploy through SSM
        id: deploy
        env:
          APP_IMAGE: ${{ steps.image.outputs.image }}
          APP_SECRET_ID: ${{ vars.APP_SECRET_ID }}
          BUNDLE_KEY: ${{ steps.bundle.outputs.key }}
          BUNDLE_SHA256: ${{ steps.bundle.outputs.sha256 }}
          BUNDLE_VERSION_ID: ${{ steps.bundle.outputs.version_id }}
          DEPLOYMENT_BUCKET: ${{ vars.DEPLOYMENT_BUCKET }}
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          INSTANCE_ID: ${{ vars.STAGING_INSTANCE_ID }}
          LOG_GROUP: ${{ vars.STAGING_LOG_GROUP }}
          SITE_ADDRESS: ${{ inputs.site_address }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex

          values = {
              "DEPLOY_BUCKET": os.environ["DEPLOYMENT_BUCKET"],
              "BUNDLE_KEY": os.environ["BUNDLE_KEY"],
              "BUNDLE_VERSION_ID": os.environ["BUNDLE_VERSION_ID"],
              "BUNDLE_SHA256": os.environ["BUNDLE_SHA256"],
              "DEPLOYMENT_ID": "-".join((os.environ["GITHUB_SHA"], os.environ["GITHUB_RUN_ID"], os.environ["GITHUB_RUN_ATTEMPT"])),
              "APP_IMAGE": os.environ["APP_IMAGE"],
              "ECR_REPOSITORY_URI": os.environ["ECR_REPOSITORY_URI"],
              "DEPLOY_ENV": os.environ["DEPLOY_ENV"],
              "SITE_ADDRESS": os.environ["SITE_ADDRESS"],
              "APP_SECRET_ID": os.environ["APP_SECRET_ID"],
              "AWS_REGION": os.environ["AWS_REGION"],
              "LOG_GROUP": os.environ["LOG_GROUP"],
          }
          source = "/tmp/shindang-deployment.tgz"
          script = "/tmp/shindang-remote-deploy.sh"
          quote = shlex.quote
          command = "env " + " ".join(f"{key}={quote(value)}" for key, value in values.items())
          cleanup = f"rm -f {quote(source)} {quote(script)}"
          commands = [
              "set -euo pipefail",
              "umask 077",
              f"trap {quote(cleanup)} EXIT",
              "aws s3api get-object "
              f"--bucket {quote(values['DEPLOY_BUCKET'])} "
              f"--key {quote(values['BUNDLE_KEY'])} "
              f"--version-id {quote(values['BUNDLE_VERSION_ID'])} {quote(source)} >/dev/null",
              f"printf '%s  %s\\n' {quote(values['BUNDLE_SHA256'])} {quote(source)} | sha256sum --check --status",
              f"tar -xOzf {quote(source)} remote_deploy.sh > {quote(script)}",
              f"chmod 0700 {quote(script)}",
              f"{command} bash {quote(script)}",
          ]
          with open("ssm-parameters.json", "w", encoding="utf-8") as handle:
              json.dump({"commands": commands}, handle)
          PY
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "shindang staging $GITHUB_SHA" \
            --parameters file://ssm-parameters.json \
            --query Command.CommandId --output text)"
          set +e
          aws ssm wait command-executed --command-id "$command_id" --instance-id "$INSTANCE_ID"
          wait_rc=$?
          set -e
          invocation="$(aws ssm get-command-invocation \
            --command-id "$command_id" --instance-id "$INSTANCE_ID" --output json)"
          status="$(jq -r '.Status' <<<"$invocation")"
          standard_output="$(jq -r '.StandardOutputContent // ""' <<<"$invocation")"
          result_json="$(printf '%s\n' "$standard_output" | sed -n 's/^SHINDANG_DEPLOY_RESULT=//p' | tail -n 1)"
          if [ -n "$result_json" ]; then
            jq -e 'select(
              (.status | type == "string") and
              (.rollback_status | type == "string") and
              (.previous_release | type == "string") and
              (.previous_digest | type == "string") and
              (.image_digest | type == "string") and
              (.bundle_version_id | type == "string") and
              (.bundle_sha256 | type == "string") and
              (.deploy_env | type == "string")
            )' <<<"$result_json" > deployment-result.json
            echo "image_digest=$(jq -r '.image_digest' deployment-result.json)" >> "$GITHUB_OUTPUT"
            echo "previous_digest=$(jq -r '.previous_digest' deployment-result.json)" >> "$GITHUB_OUTPUT"
            echo "previous_release=$(jq -r '.previous_release' deployment-result.json)" >> "$GITHUB_OUTPUT"
          fi
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          [ "$wait_rc" -eq 0 ] && [ "$status" = Success ]
          test -s deployment-result.json
          test "$(jq -r '.status' deployment-result.json)" = healthy
          test "$(jq -r '.deploy_env' deployment-result.json)" = staging
          test "$(jq -r '.image_digest' deployment-result.json)" = "${APP_IMAGE##*@}"
          test "$(jq -r '.bundle_version_id' deployment-result.json)" = "$BUNDLE_VERSION_ID"
          test "$(jq -r '.bundle_sha256' deployment-result.json)" = "$BUNDLE_SHA256"
      - name: HTTPS smoke
        env:
          SITE_ADDRESS: ${{ inputs.site_address }}
        run: |
          curl --fail --silent --show-error --retry 6 --retry-delay 5 "$SITE_ADDRESS/healthz" | jq -e '.status == "ok"'
          curl --fail --silent --show-error --retry 6 --retry-delay 5 "$SITE_ADDRESS/readyz" | jq -e '.status == "ready"'
          curl --fail --silent --show-error --retry 6 --retry-delay 5 "$SITE_ADDRESS/api/auth/providers" | jq -e 'type == "object"'
      - name: Record non-secret deployment evidence
        if: always()
        env:
          BUNDLE_KEY: ${{ steps.bundle.outputs.key }}
          BUNDLE_SHA256: ${{ steps.bundle.outputs.sha256 }}
          BUNDLE_VERSION_ID: ${{ steps.bundle.outputs.version_id }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          SITE_ADDRESS: ${{ inputs.site_address }}
          SSM_COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
        run: |
          mkdir -p deployment-evidence
          test -s deployment-result.json || printf '{}\n' > deployment-result.json
          jq -n \
            --slurpfile remote deployment-result.json \
            --arg revision "$GITHUB_SHA" \
            --arg image_digest "$IMAGE_DIGEST" \
            --arg bundle_key "$BUNDLE_KEY" \
            --arg bundle_version_id "$BUNDLE_VERSION_ID" \
            --arg bundle_sha256 "$BUNDLE_SHA256" \
            --arg site_address "$SITE_ADDRESS" \
            --arg ssm_command_id "$SSM_COMMAND_ID" \
            --arg deployed_at "$(date -u +%FT%TZ)" \
            '{revision:$revision,image_digest:$image_digest,bundle_key:$bundle_key,bundle_version_id:$bundle_version_id,bundle_sha256:$bundle_sha256,site_address:$site_address,ssm_command_id:$ssm_command_id,deployed_at:$deployed_at,remote_result:$remote[0]}' \
            > deployment-evidence/staging.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: staging-deployment-${{ github.sha }}-${{ github.run_attempt }}
          path: deployment-evidence/staging.json
          if-no-files-found: error
          retention-days: 30

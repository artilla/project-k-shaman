name: shindang

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-local-development-session-secret}
      SHINDANG_ENV: ${SHINDANG_ENV:-development}
      TRUST_PROXY: "1"
      TTS_BACKEND: ${TTS_BACKEND:-mock}
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    volumes:
      - app_state:/app/state
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://127.0.0.1}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  app_state:
  caddy_data:
  caddy_config:

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>오늘신당 — 홍연 운세</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<main class="stage">

  <p class="subtitle">홍연이 오늘의 기운을 전해드려요</p>

  <button id="start-btn" class="tap-button" type="button">탭하여 오늘의 운세 보기</button>

  <p id="status" class="status" aria-live="polite"></p>

  <section id="fortune-text" class="fortune-text" aria-live="polite"></section>

  <button id="share-btn" class="share-button" type="button" hidden>부적 받기</button>
  <p id="share-status" class="status" aria-live="polite"></p>
</main>
<script src="/static/app.js"></script>
</body>
</html>

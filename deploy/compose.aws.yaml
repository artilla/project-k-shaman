name: shindang

services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required and must include an immutable digest}
    platform: linux/arm64
    environment:
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SHINDANG_ENV: ${DEPLOY_ENV:?DEPLOY_ENV is required}
      SHINDANG_PUBLIC_BASE_URL: ${SITE_ADDRESS:?SITE_ADDRESS is required}
      TRUST_PROXY: "1"
      TTS_BACKEND: ${TTS_BACKEND:-mock}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    volumes:
      - app_state:/app/state
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?AWS_REGION is required}
        awslogs-group: ${LOG_GROUP:?LOG_GROUP is required}
        awslogs-stream: app
    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    platform: linux/arm64
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?AWS_REGION is required}
        awslogs-group: ${LOG_GROUP:?LOG_GROUP is required}
        awslogs-stream: caddy
    restart: unless-stopped

volumes:
  app_state:
  caddy_data:
  caddy_config:

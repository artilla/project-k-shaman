<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘신당 TTS A/B 청취 평가</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ee;
      --ink: #25211d;
      --muted: #6f6258;
      --line: #d8ccc0;
      --panel: #fffaf5;
      --accent: #b5332c;
      --accent-soft: #f4ddd7;
      --good: #23684b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(247, 243, 238, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    button, .link-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    main { padding: 22px 0 48px; }
    .note {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 18px;
      color: var(--muted);
    }
    .sample {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 18px 0;
      overflow: hidden;
    }
    .sample-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff5ec;
    }
    .sample-title {
      font-weight: 700;
      font-size: 17px;
    }
    .topic {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 9px;
      font-size: 13px;
      font-weight: 700;
      margin-left: 8px;
    }
    .players {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }
    .variant {
      padding: 16px;
      border-right: 1px solid var(--line);
    }
    .variant:last-child { border-right: 0; }
    .variant h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .variant p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    audio {
      width: 100%;
      margin: 8px 0;
    }
    details {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    summary { cursor: pointer; color: var(--ink); }
    table {
      width: 100%;
      border-collapse: collapse;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-weight: 700;
      background: #fbf0e6;
    }
    select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 8px;
      font: inherit;
    }
    .decision {
      margin-top: 18px;
      background: #f0faf4;
      border: 1px solid #b8ddc8;
      color: var(--good);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .export {
      width: 100%;
      min-height: 180px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      resize: vertical;
    }
    @media (max-width: 820px) {
      .top { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .players { grid-template-columns: 1fr; }
      .variant { border-right: 0; border-bottom: 1px solid var(--line); }
      .variant:last-child { border-bottom: 0; }
      th:nth-child(n+4), td:nth-child(n+4) { min-width: 92px; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>오늘신당 TTS A/B 청취 평가</h1>
        <p class="sub">A = LLM narration, B = 서버 조립 narration. 점수는 이 브라우저에 자동 저장됩니다.</p>
      </div>
      <div class="actions">
        <a class="link-button" href="../../docs/reports/tts/listening-qa-rubric.md">루브릭 보기</a>
        <a class="link-button" href="../../docs/reports/tts/ab-comparison.md">텍스트 비교</a>
        <button type="button" onclick="exportScores()">점수 JSON 만들기</button>
        <button type="button" class="primary" onclick="downloadScores()">점수 다운로드</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="note">
      <strong>평가 기준:</strong> B의 <strong>scores 평균 ≥ 4.0</strong> 그리고 <strong>연결 평균 ≥ 4.0</strong>이면 서버 조립 채택.
      둘 중 하나가 3.5 미만이면 <strong>scores_line 중간안</strong>, B 전반이 3.0 미만이면 현행 A 유지입니다.
    </section>

    <div id="samples"></div>

    <section class="decision">
      <strong>현재 자동 판정:</strong>
      <span id="decisionText">아직 점수가 부족합니다.</span>
    </section>

    <textarea id="exportBox" class="export" spellcheck="false" placeholder="점수 JSON이 여기에 생성됩니다."></textarea>
  </main>

  <script>
    const samples = [
      {
        seed: "h_love_001",
        topic: "love",
        aScores: "연애운이 활짝 열렸고 인간관계도 좋아요. 다만 컨디션은 조금 낮으니 무리하진 마세요.",
        bScores: "연애운이 아주 좋고, 컨디션은 조금 낮으니 무리하진 마세요."
      },
      {
        seed: "h_money_001",
        topic: "money",
        aScores: "금전운이 든든하게 올라와 있어요. 일운도 안정적이라 차근차근 정리하기 좋아요.",
        bScores: "금전운이 아주 좋고, 인간관계운은 조금 낮으니 무리하진 마세요."
      },
      {
        seed: "h_work_001",
        topic: "work",
        aScores: "일과 학업운이 아주 좋아요. 컨디션도 받쳐주니 중요한 일을 먼저 처리하기 좋아요.",
        bScores: "일과 학업운이 아주 좋고, 연애운은 조금 낮으니 무리하진 마세요."
      },
      {
        seed: "h_rel_001",
        topic: "relationship",
        aScores: "인간관계운이 활짝 열렸어요. 연애운도 잔잔히 좋고 컨디션도 무난해요.",
        bScores: "인간관계운이 아주 좋고, 금전운은 조금 낮으니 무리하진 마세요."
      },
      {
        seed: "h_total_001",
        topic: "total",
        aScores: "모든 운이 고르게 좋은 편이에요. 특별히 튀는 곳 없이 무난하고 든든한 하루예요.",
        bScores: "인간관계운이 좋은 편이고, 전반적으로 고르게 안정적이에요."
      }
    ];
    const criteria = [
      ["naturalness", "자연스러움"],
      ["connection", "연결"],
      ["scores", "scores"],
      ["character", "캐릭터성"],
      ["overall", "전체"]
    ];
    const variants = [
      ["A", "LLM narration"],
      ["B", "서버 조립 narration"]
    ];
    const key = "oneul-shindang-tts-ab-scores-v1";
    const saved = JSON.parse(localStorage.getItem(key) || "{}");

    function scoreSelect(seed, version, criterion) {
      const id = `${seed}.${version}.${criterion}`;
      const value = saved[id] || "";
      const options = ["", "1", "2", "3", "4", "5"]
        .map(v => `<option value="${v}" ${v === value ? "selected" : ""}>${v || "-"}</option>`)
        .join("");
      return `<select data-score="${id}" aria-label="${seed} ${version} ${criterion}">${options}</select>`;
    }

    function render() {
      const root = document.getElementById("samples");
      root.innerHTML = samples.map(sample => `
        <section class="sample">
          <div class="sample-head">
            <div class="sample-title">${sample.seed}<span class="topic">${sample.topic}</span></div>
            <div>${sample.seed}_A/B.mp3</div>
          </div>
          <div class="players">
            <div class="variant">
              <h3>A. LLM narration</h3>
              <audio controls preload="metadata" src="out/${sample.seed}_A.mp3"></audio>
              <p><strong>scores:</strong> ${sample.aScores}</p>
              <details>
                <summary>파일 직접 열기</summary>
                <p><a href="out/${sample.seed}_A.mp3">${sample.seed}_A.mp3</a></p>
              </details>
            </div>
            <div class="variant">
              <h3>B. 서버 조립 narration</h3>
              <audio controls preload="metadata" src="out/${sample.seed}_B.mp3"></audio>
              <p><strong>scores:</strong> ${sample.bScores}</p>
              <details>
                <summary>파일 직접 열기</summary>
                <p><a href="out/${sample.seed}_B.mp3">${sample.seed}_B.mp3</a></p>
              </details>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>버전</th>
                ${criteria.map(([, label]) => `<th>${label}</th>`).join("")}
                <th>메모</th>
              </tr>
            </thead>
            <tbody>
              ${variants.map(([version, label]) => `
                <tr>
                  <td><strong>${version}</strong> ${label}</td>
                  ${criteria.map(([criterion]) => `<td>${scoreSelect(sample.seed, version, criterion)}</td>`).join("")}
                  <td><input type="text" data-note="${sample.seed}.${version}.note" value="${saved[`${sample.seed}.${version}.note`] || ""}" placeholder="짧은 메모"></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
      `).join("");
      bind();
      updateDecision();
    }

    function bind() {
      document.querySelectorAll("[data-score], [data-note]").forEach(el => {
        el.addEventListener("change", () => {
          const id = el.dataset.score || el.dataset.note;
          saved[id] = el.value;
          localStorage.setItem(key, JSON.stringify(saved));
          updateDecision();
        });
      });
    }

    function collect() {
      const rows = [];
      for (const sample of samples) {
        for (const [version] of variants) {
          const row = { seed: sample.seed, topic: sample.topic, version, scores: {}, note: saved[`${sample.seed}.${version}.note`] || "" };
          for (const [criterion] of criteria) {
            const raw = saved[`${sample.seed}.${version}.${criterion}`];
            row.scores[criterion] = raw ? Number(raw) : null;
          }
          rows.push(row);
        }
      }
      return {
        evaluated_at: new Date().toISOString(),
        rubric: "docs/reports/tts/listening-qa-rubric.md",
        decision_hint: decision(),
        rows
      };
    }

    function avg(values) {
      const nums = values.filter(v => typeof v === "number" && !Number.isNaN(v));
      return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : null;
    }

    function decision() {
      const rows = collectRowsOnly();
      const bRows = rows.filter(r => r.version === "B");
      const bScoresAvg = avg(bRows.map(r => r.scores.scores));
      const bConnectionAvg = avg(bRows.map(r => r.scores.connection));
      const bOverallAvg = avg(bRows.map(r => r.scores.overall));
      if (bScoresAvg === null || bConnectionAvg === null || bOverallAvg === null) {
        return { status: "incomplete", text: "아직 점수가 부족합니다." };
      }
      if (bScoresAvg >= 4.0 && bConnectionAvg >= 4.0) {
        return { status: "accept_server_assembly", text: `서버 조립 채택 후보: B scores ${bScoresAvg.toFixed(2)}, 연결 ${bConnectionAvg.toFixed(2)}` };
      }
      if (bScoresAvg < 3.0 || bConnectionAvg < 3.0 || bOverallAvg < 3.0) {
        return { status: "keep_current", text: `현행 유지 후보: B scores ${bScoresAvg.toFixed(2)}, 연결 ${bConnectionAvg.toFixed(2)}, 전체 ${bOverallAvg.toFixed(2)}` };
      }
      if (bScoresAvg < 3.5 || bConnectionAvg < 3.5) {
        return { status: "scores_line_middle", text: `scores_line 중간안 후보: B scores ${bScoresAvg.toFixed(2)}, 연결 ${bConnectionAvg.toFixed(2)}` };
      }
      return { status: "needs_review", text: `추가 검토: B scores ${bScoresAvg.toFixed(2)}, 연결 ${bConnectionAvg.toFixed(2)}, 전체 ${bOverallAvg.toFixed(2)}` };
    }

    function collectRowsOnly() {
      const rows = [];
      for (const sample of samples) {
        for (const [version] of variants) {
          const row = { seed: sample.seed, topic: sample.topic, version, scores: {} };
          for (const [criterion] of criteria) {
            const raw = saved[`${sample.seed}.${version}.${criterion}`];
            row.scores[criterion] = raw ? Number(raw) : null;
          }
          rows.push(row);
        }
      }
      return rows;
    }

    function updateDecision() {
      document.getElementById("decisionText").textContent = decision().text;
    }

    function exportScores() {
      const payload = collect();
      document.getElementById("exportBox").value = JSON.stringify(payload, null, 2);
      return payload;
    }

    function downloadScores() {
      const payload = exportScores();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "tts-ab-listening-scores.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>
</html>

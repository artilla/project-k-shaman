name: App CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  full-gate-and-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.lock
          python -m pip install --disable-pip-version-check pytest ruff
          npm --prefix frontend ci
          sudo apt-get update
          sudo apt-get install --yes bats
      - name: Run the full repository gate
        run: ./scripts/run_checks.sh --full
      - name: Build the same-origin application image
        run: docker build --tag shindang:${GITHUB_SHA} .

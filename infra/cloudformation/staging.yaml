AWSTemplateFormatVersion: "2010-09-09"
Description: Shindang staging EC2, ECR, SSM, secret, logging, and GitHub OIDC deployment boundary.

Parameters:
  ProjectName:
    Type: String
    Default: shindang
    AllowedPattern: "[a-z0-9-]+"
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging]
  GitHubRepository:
    Type: String
    Default: artilla/project-k-shaman
    AllowedPattern: "[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+"
  GitHubOidcProviderArn:
    Type: String
    Description: Existing token.actions.githubusercontent.com IAM OIDC provider ARN.
    AllowedPattern: "arn:aws:iam::[0-9]{12}:oidc-provider/token[.]actions[.]githubusercontent[.]com"
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Type: String
    Default: t4g.micro
    AllowedValues: [t4g.micro, t4g.small]
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64

Resources:
  AppRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub "${ProjectName}-${Environment}"
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: >-
          {"rules":[{"rulePriority":1,"description":"Keep the most recent 30 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":30},"action":{"type":"expire"}}]}

  DeploymentBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-bundles
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 7

  AppSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/app"
      Description: Runtime application secrets. OAuth values are populated out of band.
      GenerateSecretString:
        SecretStringTemplate: '{"TTS_BACKEND":"mock"}'
        GenerateStringKey: SESSION_SECRET
        PasswordLength: 64
        ExcludePunctuation: true

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${ProjectName}/${Environment}/app"
      RetentionInDays: 14

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTPS edge only; application port and SSH remain private.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: ACME and HTTP redirect
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: udp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTP3
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-instance"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: runtime-assets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !GetAtt AppRepository.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "${DeploymentBucket.Arn}/deployments/*"
              - Effect: Allow
                Action: s3:GetBucketLocation
                Resource: !GetAtt DeploymentBucket.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref AppSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: !Sub "${AppLogGroup.Arn}:*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  StagingInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref AppSecurityGroup]
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
        HttpPutResponseHopLimit: 1
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeSize: 16
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/usr/bin/env bash
          set -euo pipefail
          dnf install -y docker aws-cfn-bootstrap
          install -d -m 0755 /usr/local/lib/docker/cli-plugins /opt/shindang/releases
          curl --fail --silent --show-error --location \
            https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-aarch64 \
            --output /usr/local/lib/docker/cli-plugins/docker-compose
          echo '71f38f0923b8a9b80ad02c823ec3207d94677547aa5c618ca41b81d29fe6b9d9  /usr/local/lib/docker/cli-plugins/docker-compose' | sha256sum --check
          chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose
          systemctl enable --now docker amazon-ssm-agent
          /opt/aws/bin/cfn-signal --exit-code 0 --stack '${AWS::StackName}' --resource StagingInstance --region '${AWS::Region}'

  StagingAddress:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref StagingInstance
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-github-deploy"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepository}:environment:${Environment}"
      Policies:
        - PolicyName: deploy-immutable-image
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:DescribeImages
                Resource: !GetAtt AppRepository.Arn
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${DeploymentBucket.Arn}/deployments/*"
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - arn:aws:ssm:*::document/AWS-RunShellScript
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${StagingInstance}"
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"

Outputs:
  EcrRepositoryUri:
    Value: !GetAtt AppRepository.RepositoryUri
  DeploymentBucketName:
    Value: !Ref DeploymentBucket
  AppSecretId:
    Value: !Ref AppSecret
  LogGroupName:
    Value: !Ref AppLogGroup
  InstanceId:
    Value: !Ref StagingInstance
  PublicIp:
    Value: !Ref StagingAddress
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
